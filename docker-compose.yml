version: '3.9'

services:
  # ── PostgreSQL Database ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: carevista_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: carevista
      POSTGRES_USER: carevista_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-carevista_secure_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carevista_user -d carevista"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (sessions, queues, caching) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: carevista_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-carevista_redis_pass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carevista_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://carevista_user:${DB_PASSWORD:-carevista_secure_pass}@postgres:5432/carevista
      REDIS_URL: redis://:${REDIS_PASSWORD:-carevista_redis_pass}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_minimum_32_chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_refresh_secret_32chars}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      BCRYPT_ROUNDS: 12
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-carevista-files}
      AWS_REGION: ${AWS_REGION:-eu-west-2}
      SMTP_HOST: ${SMTP_HOST:-smtp.sendgrid.net}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@carevista.co.uk}
    ports:
      - "3001:3001"
    volumes:
      - ./backend/uploads:/app/uploads

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001/api}
    container_name: carevista_web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: carevista_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro

volumes:
  postgres_data:
  redis_data:
